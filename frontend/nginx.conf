server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Generous upload cap so the 50 MB backend limit is the real ceiling.
    client_max_body_size 64m;

    # Reverse-proxy API calls to the backend service on the docker network.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # File-export downloads can be slow on huge histories.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA fallback: any unknown route serves index.html so client-side
    # routing keeps working.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
